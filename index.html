<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSINT Search Engine</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:#0b1120;
color:white;
}

.container{
width:95%;
max-width:1000px;
margin:auto;
padding:30px;
text-align:center;
}

h1{
font-size:42px;
color:#38bdf8;
margin-bottom:10px;
}

.subtitle{
color:#94a3b8;
margin-bottom:30px;
}

.panel{
background:#1e293b;
padding:25px;
border-radius:20px;
box-shadow:0 0 25px #000;
}

select,input,button{
width:90%;
max-width:700px;
padding:15px;
margin:10px;
border-radius:12px;
border:none;
font-size:18px;
}

select,input{
background:#334155;
color:white;
}

button{
background:#38bdf8;
color:#000;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

.result{
background:#334155;
padding:15px;
margin:15px 0;
border-radius:12px;
text-align:right;
}

.result a{
color:#38bdf8;
}

.footer{
margin-top:40px;
color:#64748b;
}

.card-title{
color:#38bdf8;
font-size:22px;
}

</style>
</head>

<body>

<div class="container">

<h1>🔎 OSINT SEARCH ENGINE</h1>

<div class="subtitle">
מערכת מודיעין ממקורות פתוחים
</div>

<div class="panel">

<div class="card-title">
בחר סוג חיפוש
</div>

<select id="type">
<option value="username">Username</option>
<option value="email">Email</option>
<option value="domain">Domain</option>
<option value="phone">Phone</option>
<option value="ip">IP Address</option>
<option value="image">Image</option>
</select>

<input id="query" placeholder="הזן נתון לחיפוש">

<button onclick="searchOSINT()">
🔍 חיפוש
</button>

<div id="results"></div>

</div>

<div class="footer">
OSINT Engine v1.0
</div>

</div>

<script>

function searchOSINT(){

let query=document.getElementById("query").value;
let type=document.getElementById("type").value;
let results=document.getElementById("results");

if(query==""){
results.innerHTML="<div class='result'>נא להזין נתון</div>";
return;
}

let data={

username:[
["WhatsMyName","https://whatsmyname.app/"],
["Namechk","https://namechk.com/"]
],

email:[
["Have I Been Pwned","https://haveibeenpwned.com/"],
["EmailRep","https://emailrep.io/"]
],

domain:[
["WHOIS","https://who.is/"],
["SecurityTrails","https://securitytrails.com/"]
],

phone:[
["Truecaller","https://www.truecaller.com/"],
["NumVerify","https://numverify.com/"]
],

ip:[
["IPInfo","https://ipinfo.io/"],
["AbuseIPDB","https://www.abuseipdb.com/"]
],

image:[
["Google Lens","https://lens.google.com/"],
["Yandex Images","https://yandex.com/images/"]
]

};
  results.innerHTML="<h3>תוצאות עבור: "+query+"</h3>";

data[type].forEach(function(site){

results.innerHTML +=
`
<div class="result">
<b>${site[0]}</b><br>
<a href="${site[1]}" target="_blank">
פתח כלי חיפוש
</a>
</div>
`;

});

}

</script>

</body>
</html>
