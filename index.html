<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OSINT Search Engine</title>

<style>
*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

.container{
max-width:950px;
margin:auto;
padding:30px;
text-align:center;
}

h1{
font-size:42px;
color:#38bdf8;
}

.subtitle{
color:#cbd5e1;
font-size:18px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:20px;
box-shadow:0 0 25px #000;
}

select,input,button{
width:90%;
max-width:700px;
padding:15px;
margin:10px;
border-radius:12px;
border:none;
font-size:18px;
}

select,input{
background:#334155;
color:white;
}

button{
background:#38bdf8;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

#results{
margin-top:25px;
text-align:right;
}

.result{
background:#334155;
padding:15px;
margin:12px 0;
border-radius:12px;
}

a{
color:#38bdf8;
text-decoration:none;
}

.footer{
margin-top:40px;
color:#64748b;
}

.badge{
display:inline-block;
background:#0ea5e9;
color:black;
padding:5px 12px;
border-radius:20px;
margin:5px;
}

</style>

</head>

<body>

<div class="container">

<h1>🔎 OSINT SEARCH ENGINE</h1>

<div class="subtitle">
Open Source Intelligence Platform
</div>

<div>
<span class="badge">Username</span>
<span class="badge">Email</span>
<span class="badge">Domain</span>
<span class="badge">IP</span>
<span class="badge">Phone</span>
<span class="badge">Image</span>
</div>

<br>

<div class="card">

<select id="type">

<option value="username">חיפוש Username</option>
<option value="email">חיפוש Email</option>
<option value="domain">חיפוש Domain</option>
<option value="phone">חיפוש Phone</option>
<option value="ip">חיפוש IP</option>
<option value="image">חיפוש תמונה</option>

</select>


<input id="query" placeholder="הזן נתון לחיפוש">


<button onclick="searchOSINT()">
🔍 בצע חיפוש
</button>


<div id="results"></div>


</div>


<div class="footer">
OSINT Search Engine v1.0
</div>

</div>


<script>

function searchOSINT(){

let query=document.getElementById("query").value;
let type=document.getElementById("type").value;

let results=document.getElementById("results");


if(!query){

results.innerHTML="<div class='result'>נא להזין נתון לחיפוש</div>";
return;

}


let data={

username:[
["WhatsMyName","https://whatsmyname.app/"],
["Namechk","https://namechk.com/"]
],

email:[
["Have I Been Pwned","https://haveibeenpwned.com/"],
["EmailRep","https://emailrep.io/"]
],

domain:[
["WHOIS","https://who.is/"],
["SecurityTrails","https://securitytrails.com/"]
],

phone:[
["Truecaller","https://www.truecaller.com/"],
["NumVerify","https://numverify.com/"]
],

ip:[
["IPInfo","https://ipinfo.io/"],
["AbuseIPDB","https://www.abuseipdb.com/"]
],

image:[
["Google Lens","https://lens.google.com/"],
["Yandex Images","https://yandex.com/images/"]
]

};


results.innerHTML=
"<h3>תוצאות עבור: "+query+"</h3>";


data[type].forEach(function(site){

results.innerHTML+=
`
<div class="result">

<b>${site[0]}</b><br>

<a href="${site[1]}" target="_blank">
פתח כלי חיפוש
</a>
