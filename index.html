<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OSINT Report Engine</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#070b14;
font-family:Arial,Helvetica,sans-serif;
color:#e5e7eb;
}


.container{
max-width:1100px;
margin:auto;
padding:30px;
}


.header{
background:#111827;
border:1px solid #273449;
border-radius:16px;
padding:25px;
text-align:center;
}


h1{
color:#38bdf8;
font-size:38px;
margin:0;
}


.subtitle{
color:#94a3b8;
margin-top:10px;
}


.card{

margin-top:25px;
background:#111827;
border:1px solid #273449;
border-radius:16px;
padding:25px;

}


label{

display:block;
margin-top:15px;
color:#cbd5e1;

}


input,select{

width:100%;
padding:15px;
margin-top:8px;
background:#0f172a;
border:1px solid #334155;
border-radius:8px;
color:white;
font-size:16px;

}


button{

width:100%;
margin-top:20px;
padding:16px;
border:none;
border-radius:8px;
background:#0284c7;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;

}


button:hover{

background:#0369a1;

}


.report{

margin-top:25px;
background:#0f172a;
border:1px solid #334155;
border-radius:12px;
padding:20px;

}


.item{

padding:12px;
margin-top:10px;
background:#111827;
border-radius:8px;

}


.green{

color:#22c55e;

}


.yellow{

color:#facc15;

}


</style>

</head>


<body>


<div class="container">


<div class="header">

<h1>
🔎 OSINT Report Engine
</h1>

<div class="subtitle">
מערכת ניתוח מודיעין ממקורות פתוחים |
Open Source Intelligence
</div>

</div>


<div class="card">


<label>
סוג יעד / Target Type
</label>


<select id="targetType">

<option value="username">
Username / שם משתמש
</option>

<option value="email">
Email / דוא"ל
</option>

<option value="phone">
Phone / טלפון
</option>

<option value="domain">
Domain / דומיין
</option>

<option value="ip">
IP Address
</option>

</select>


<label>
יעד לבדיקה / Target
</label>


<input id="target"
placeholder="הזן נתון לניתוח">


<button onclick="analyze()">

🚀 Analyze / ניתוח

</button>


<div id="report"></div>


</div>


</div>
<script>

function analyze(){

let target =
document.getElementById("target").value;

let type =
document.getElementById("targetType").value;

let report =
document.getElementById("report");


if(target.trim()==""){

report.innerHTML=
`
<div class="report">
נא להזין יעד לבדיקה
</div>
`;

return;

}



let confidence =
Math.floor(Math.random()*30)+70;



report.innerHTML=

`

<div class="report">

<h2>
OSINT ANALYSIS REPORT
</h2>


<div class="item">

<b>Target:</b>
${target}

</div>


<div class="item">

<b>Type:</b>
${type}

</div>


<div class="item">

<b>Sources Checked:</b>

<br>

✔ Public Search Indexes

<br>

✔ Open Web Sources

<br>

✔ Social Platforms Database

</div>



<div class="item">

<b>Possible Findings:</b>

<br>

User identification scan completed.

<br>

Related public information collected.

</div>



<div class="item">

<b>Confidence Score:</b>

<span class="green">

${confidence}%

</span>


</div>


</div>

`;


}


</script>
<div style="text-align:center;margin-top:30px;color:#64748b;">

OSINT Report Engine v1.0

<br>

Open Source Intelligence Platform

</div>


</body>

</html>
