<!DOCTYPE html>
<html lang="he" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>OSINT Search Engine</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}.container{max-width:900px;margin:auto;padding:30px;text-align:center}h1{color:#38bdf8}.box{background:#1e293b;padding:25px;border-radius:20px}input,select,button{width:90%;padding:15px;margin:10px;border-radius:10px;border:0;font-size:18px}input,select{background:#334155;color:white}button{background:#38bdf8;font-weight:bold}.result{background:#334155;padding:15px;margin:10px;border-radius:10px;text-align:right}.result a{color:#38bdf8}
</style></head>
<body><div class="container"><h1>🔎 OSINT SEARCH ENGINE</h1><p>Open Source Intelligence Platform</p><div class="box">
<select id="type"><option value="username">Username</option><option value="email">Email</option><option value="domain">Domain</option><option value="phone">Phone</option><option value="ip">IP</option><option value="image">Image</option></select>
<input id="query" placeholder="הזן נתון לחיפוש"><button onclick="searchOSINT()">חפש</button><div id="results"></div></div></div>
<script>
function searchOSINT(){let q=document.getElementById('query').value,t=document.getElementById('type').value,r=document.getElementById('results');if(!q){r.innerHTML='נא להזין נתון';return}let s={username:[['WhatsMyName','https://whatsmyname.app/'],['Namechk','https://namechk.com/']],email:[['Have I Been Pwned','https://haveibeenpwned.com/'],['EmailRep','https://emailrep.io/']],domain:[['WHOIS','https://who.is/'],['SecurityTrails','https://securitytrails.com/']],phone:[['Truecaller','https://www.truecaller.com/'],['NumVerify','https://numverify.com/']],ip:[['IPInfo','https://ipinfo.io/'],['AbuseIPDB','https://www.abuseipdb.com/']],image:[['Google Lens','https://lens.google.com/'],['Yandex Images','https://yandex.com/images/']]};r.innerHTML='<h3>תוצאות עבור: '+q+'</h3>';s[t].forEach(x=>r.innerHTML+='<div class="result"><b>'+x[0]+'</b><br><a target="_blank" href="'+x[1]+'">פתח כלי חיפוש</a></div>')}
</script></body></html>
