<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSINT Search Engine Pro</title>

<link rel="stylesheet" href="style.css">

<script src="config.js"></script>
<script src="script.js" defer></script>

</head>

<body>

<div class="container">

<h1>🔎 OSINT Search Engine Pro</h1>
<p>מערכת חיפוש במקורות מידע ציבוריים</p>

<div class="search-box">

<input
id="searchInput"
type="text"
placeholder="הקלד שם, מייל, טלפון, IP, דומיין או שם משתמש">

<select id="searchType">
<option value="auto">זיהוי אוטומטי</option>
<option value="name">שם</option>
<option value="phone">טלפון</option>
<option value="email">אימייל</option>
<option value="domain">דומיין</option>
<option value="ip">IP</option>
<option value="username">שם משתמש</option>
</select>

<button id="searchButton">
🔍 חפש
</button>

</div>

<div id="resultsContainer"></div>

</div>

</body>
</html>
