<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSINT Search Engine</title>
<style>
body{
font-family:Arial,sans-serif;
background:#0f172a;
color:#fff;
text-align:center;
margin:0;
padding:40px;
}
h1{font-size:42px;}
input{
width:80%;
max-width:600px;
padding:15px;
font-size:18px;
border-radius:8px;
border:none;
margin:20px 0;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
max-width:900px;
margin:auto;
}
.card{
background:#1e293b;
padding:20px;
border-radius:12px;
cursor:pointer;
transition:.2s;
}
.card:hover{
background:#334155;
}
</style>
</head>
<body>

<h1>🔎 OSINT Search Engine</h1>
<p>בחר קטגוריה</p>

<input placeholder="חיפוש בהמשך...">

<div class="grid">
<div class="card">👤 Username</div>
<div class="card">📧 Email</div>
<div class="card">🌐 Domain</div>
<div class="card">📱 Phone</div>
<div class="card">🌍 IP</div>
<div class="card">🖼️ Image</div>
</div>

</body>
</html>
